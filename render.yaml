services:
  - type: web
    name: wavepalace-api
    runtime: python
    rootDir: apps/backend
    buildCommand: apt-get install -y ffmpeg fonts-dejavu-core && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: wavepalace
      - key: FRONTEND_ORIGIN
        value: https://wavepalace.live
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: wavepalace-media
      - key: R2_PUBLIC_BASE_URL
        value: https://stream.wavepalace.live
      - key: FONT_PATH
        value: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
      - key: ADMIN_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
