<svg width="220" height="48" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="palace-gradient" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#38e8ff"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ff5cc8"/>
    </linearGradient>
  </defs>

  <!-- Disc3 icon centered vertically in the 48px tall frame -->
  <g transform="translate(0, 12)" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M6 12c0-1.7.7-3.2 1.8-4.2"/>
    <circle cx="12" cy="12" r="2"/>
    <path d="M18 12c0 1.7-.7 3.2-1.8 4.2"/>
  </g>

  <!-- Logo wordmark -->
  <text font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" letter-spacing="-0.5">
    <tspan x="34" y="31" fill="#ece9ff">Wave</tspan><tspan fill="url(#palace-gradient)">Palace</tspan>
  </text>
</svg>
